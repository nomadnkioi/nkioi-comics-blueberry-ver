<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>nkioi comics - tiger ver. 🌼</title>
  
  <!-- 프리미엄 구글 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">

  <!-- JSZip 라이브러리 로드 (로컬 압축 파일 동적 해제용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- Unarchiver.js 라이브러리 로드 (RAR, CBR, ZIP, CBZ 통합 디컴프레서) -->
  <script src="https://xenova.github.io/unarchiver.js/dist/unarchiver.min.js"></script>
  <!-- Google API 및 Identity Services SDK 로드 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <!-- iOS 웹앱 및 브라우저 파비콘 아이콘 -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="style.css?v=1.0.5">
</head>

<body>

  <!-- 전체 앱 컨테이너 (iPhone 15 뷰포트에 맞춘 레이아웃) -->
  <div id="app-container">

    <!-- DYNAMIC ISLAND (아이폰 15 시각적 디테일 연출 - 데스크톱 뷰포트에서 더욱 프리미엄한 느낌 전달) -->
    <div class="dynamic-island"></div>

    <!-- ==================== 1. 홈 화면 (서재 라이브러리) ==================== -->
    <section id="library-screen" class="screen active">
      <header class="library-header">
        <h1 class="app-logo">나교이 만화가게 <span>🌼</span></h1>
        <p class="app-subtitle">NKIOI COMICS</p>
        <button class="settings-btn" id="btn-open-settings" title="구글 드라이브 설정">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </header>

      <main class="library-main">
        <!-- 책이 없을 때 표시되는 미니멀리즘 불러오기 공간 -->
        <div id="empty-state" class="empty-state">
          <img src="library-tiger-mascot.png" class="empty-state-tiger" alt="호랑이 마스코트" style="width: 140px; height: 140px; object-fit: contain; margin-bottom: 24px; image-rendering: pixelated;">
          <div class="upload-btn-wrapper">
            <button class="btn-primary" id="btn-load-comics">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
              <span>기기에서 불러오기 🐯</span>
            </button>
            <input type="file" id="comics-file-input" accept=".zip,.cbz,.rar,.cbr" multiple style="display: none;">
          </div>

          <button class="btn-primary btn-gdrive" id="btn-load-gdrive" style="margin-bottom: 24px;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            <span>구글 드라이브 연결</span>
          </button>

          <p class="upload-tip" style="display: none; margin-top: 16px; font-size: 14px; font-weight: 600; color: var(--text-primary); text-align: center; width: 100%;"></p>
        </div>

        <!-- 책이 불러와진 후 렌더링될 서재 카드 리스트 -->
        <div id="bookshelf" class="bookshelf" style="display: none;">
          <!-- JS를 통해 프리미엄 카드가 여기에 동적으로 추가됩니다 -->
        </div>
      </main>

      <!-- 하단 상태 표시 바 -->
      <footer class="library-footer">
        <p class="app-copyright">© 2026 nkioi comics. All rights reserved.</p>
      </footer>
    </section>

    <!-- ==================== 2. 만화책 뷰어 화면 ==================== -->
    <section id="viewer-screen" class="screen">

      <!-- 로딩 바 -->
      <div id="viewer-loader" class="viewer-loader">
        <div class="loader-spinner"></div>
        <p>만화를 읽어오는 중...</p>
      </div>

      <!-- 만화 페이지 컨테이너 -->
      <div id="comic-viewport" class="comic-viewport">
        <!-- 3분할 터치 제어 영역 -->
        <div class="touch-zones">
          <div id="touch-left" class="touch-zone" title="이전 페이지"></div>
          <div id="touch-center" class="touch-zone" title="전체화면 토글"></div>
          <div id="touch-right" class="touch-zone" title="다음 페이지"></div>
        </div>

        <!-- 만화 캔버스/이미지 영역 -->
        <div id="comic-canvas" class="comic-canvas portrait-mode slide-mode">
          <!-- JS를 통해 만화 페이지가 가로 슬라이드 또는 세로 웹툰 스타일로 노출됩니다 -->
          <img id="comic-image" src="" alt="만화 페이지" draggable="false">
          <div id="scroll-container" class="scroll-container"></div>
        </div>
      </div>

      <!-- ==================== 뷰어 조작 UI (전체화면 시 사라짐) ==================== -->

      <!-- 상단 헤더 조작바 -->
      <div class="viewer-control-bar top-bar">
        <div class="top-left-controls">
          <!-- 홈 화면(서재)으로 복귀 -->
          <button class="icon-btn" id="btn-back-home" title="서재로 돌아가기">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
          </button>

          <!-- 다른 권수 이동 드롭다운 퀵 네비게이터 -->
          <div class="volume-selector-container">
            <button class="volume-select-btn" id="btn-volume-select">
              <span id="current-volume-label">1권</span>
              <svg class="chevron-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <div class="volume-dropdown" id="volume-dropdown-list">
              <!-- JS가 동적으로 드롭다운 항목 채움 -->
            </div>
          </div>
        </div>
        <!-- 우측 상단 기능 토글 영역 (화면 회전 및 스크롤 제거 완료) -->
        <div class="top-right-controls"></div>
      </div>

      <!-- 하단 게이지 네비게이션 바 -->
      <div class="viewer-control-bar bottom-bar">
        <div class="gauge-bar-wrapper">
          <div class="page-indicator" id="page-text-indicator">0 / 0 Page</div>
          <div class="slider-container">
            <input type="range" id="viewer-page-slider" class="gauge-slider" min="1" max="1" value="1">
            <div class="gauge-track-progress" id="gauge-progress"></div>
          </div>
        </div>
      </div>

    </section>

    <!-- ==================== 3. 독서 이어보기 선택 모달 ==================== -->
    <div id="resume-modal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-strawberry">🐯</div>
        <p class="modal-desc" style="margin-top: 15px;">이전에 읽던 기록이 있습니다.<br>어떻게 읽기 시작할까요?</p>
        <div class="modal-actions">
          <button class="modal-btn btn-secondary" id="btn-read-start">처음부터 읽기</button>
          <button class="modal-btn btn-primary" id="btn-read-resume">이어서 읽기</button>
        </div>
      </div>
    </div>

    <!-- ==================== 4. 구글 드라이브 설정 모달 ==================== -->
    <div id="settings-modal" class="modal-overlay">
      <div class="modal-box settings-modal-box">
        <h3 class="modal-title">구글 드라이브 설정</h3>
        <p class="modal-desc">구글 API 연동을 위해 본인의 Client ID와 API Key를 등록해 주세요.</p>
        <div class="settings-form" style="text-align: left; margin-bottom: 20px;">
          <div class="input-group" style="margin-bottom: 15px;">
            <label for="input-client-id"
              style="display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 5px;">Google
              Client ID</label>
            <input type="text" id="input-client-id"
              style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(74, 114, 220, 0.2); outline: none; font-size: 0.85rem;"
              placeholder="Client ID 입력">
          </div>
          <div class="input-group" style="margin-bottom: 15px;">
            <label for="input-api-key"
              style="display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 5px;">Google
              API Key</label>
            <input type="password" id="input-api-key"
              style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(74, 114, 220, 0.2); outline: none; font-size: 0.85rem;"
              placeholder="API Key 입력">
          </div>
          <div class="gdrive-status-info" id="gdrive-status-info"
            style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-align: center; margin-top: 10px; padding: 8px; background-color: rgba(74, 114, 220, 0.05); border-radius: 8px;">
            상태: 연결되지 않음
          </div>
        </div>
        <div class="modal-actions">
          <button class="modal-btn btn-primary" id="btn-save-settings" style="margin-bottom: 8px;">설정 저장</button>
          <button class="modal-btn btn-secondary" id="btn-gdrive-login"
            style="margin-bottom: 8px; background-color: rgba(74, 114, 220, 0.1); color: var(--primary-strawberry); display: none;">구글
            로그인 및 연동</button>
          <button class="modal-btn btn-secondary" id="btn-gdrive-logout"
            style="margin-bottom: 8px; background-color: rgba(220, 53, 69, 0.08); color: #dc3545; border: 1px solid rgba(220, 53, 69, 0.15); display: none;">연동
            해제 및 로그아웃</button>
          <button class="modal-btn btn-close-settings" id="btn-close-settings"
            style="background: none; border: none; color: var(--text-secondary); font-size: 0.88rem; font-weight: 600; cursor: pointer; padding: 10px 0;">닫기</button>
        </div>
      </div>
    </div>
    <!-- ==================== 5. 커스텀 구글 드라이브 파일 탐색 모달 ==================== -->
    <div id="gdrive-picker-modal" class="modal-overlay">
      <div class="modal-box gdrive-picker-box">
        <div class="picker-header">
          <h3 class="modal-title">구글 드라이브 탐색</h3>
          <button class="picker-close-btn" id="btn-close-picker">✕</button>
        </div>

        <!-- 실시간 검색 및 정렬/필터링 바 -->
        <div class="picker-search-container">
          <div class="search-input-wrapper">
            <input type="text" id="picker-search-input" placeholder="이름으로 검색..." autocomplete="off">
            <button class="picker-search-clear" id="btn-clear-picker-search" style="display: none;">✕</button>
          </div>
          <select id="picker-sort-select" class="picker-sort-select">
            <option value="folder,name">이름 오름차순</option>
            <option value="folder,name desc">이름 내림차순</option>
            <option value="folder,modifiedTime desc">최신순</option>
            <option value="folder,modifiedTime asc">오래된순</option>
          </select>
        </div>

        <!-- 글로벌 검색 상태 인디케이터 (디버깅 및 로딩 상태 감지용) -->
        <div id="picker-global-status" class="picker-global-status" style="display: none; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); background-color: rgba(74, 114, 220, 0.05); padding: 8px; border-radius: 10px; margin-bottom: 10px; border: 1px dashed rgba(74, 114, 220, 0.15);">
          <div class="loader-spinner mini" style="width: 12px; height: 12px; border-width: 1.5px; margin-right: 6px; border: 1.5px solid var(--primary-strawberry); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
          <span id="picker-global-status-text">드라이브 전체 파일 검색 인덱싱 중...</span>
        </div>

        <!-- 폴더 이동 네비게이션 경로 -->
        <div class="picker-breadcrumb" id="picker-breadcrumb">
          <span class="breadcrumb-item" data-folder-id="root">My Drive</span>
        </div>

        <!-- 파일/폴더 목록 컨테이너 -->
        <div class="picker-list-container">
          <div id="picker-loader" class="picker-loader" style="display: none;">
            <div class="loader-spinner mini"></div>
            <p>목록을 불러오는 중...</p>
          </div>
          <ul class="picker-list" id="picker-file-list">
            <!-- 동적으로 파일 및 폴더 목록이 추가됨 -->
          </ul>
        </div>
      </div>
    </div>

  </div>

  <!-- 메인 스크립트 작성 예정 -->
  <script src="app.js?v=1.0.6"></script>
</body>

</html>
